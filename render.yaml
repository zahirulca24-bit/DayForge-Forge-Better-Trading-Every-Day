services:
  - type: web
    name: drayfrogd-backend
    runtime: python
    rootDir: .
    buildCommand: py -3 -m pip install -r requirements.txt
    startCommand: py -3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BYBIT_DEMO_API_KEY
        sync: false
      - key: BYBIT_DEMO_API_SECRET
        sync: false
      - key: BYBIT_LIVE_API_KEY
        sync: false
      - key: BYBIT_LIVE_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
  - type: web
    name: drayfrogd-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
