name: Apply PR72 Refactor Temp

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply canonical profile wiring
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          risk = Path("app/risk.py")
          text = risk.read_text()
          old = "from sqlalchemy.exc import SQLAlchemyError\n\nfrom app.bot_controls import stop_bot\n"
          new = "from sqlalchemy.exc import SQLAlchemyError\n\nfrom app.bot_controls import stop_bot\nfrom app.engines import ENGINE_PROFILES\n"
          if old not in text:
              raise SystemExit("risk import anchor missing")
          text = text.replace(old, new, 1)
          old = '''RISK_PROFILES: dict[str, dict[str, float]] = {
              "scalping": {
                  "risk_amount": 20.0,
                  "leverage_cap": 20.0,
                  "min_risk_reward": 1.5,
              },
              "intraday": {
                  "risk_amount": 50.0,
                  "leverage_cap": 10.0,
                  "min_risk_reward": 2.0,
              },
          }
          '''
          new = '''# Backward-compatible public view derived from the canonical engine profiles.
          RISK_PROFILES: dict[str, dict[str, float]] = {
              trade_type: profile.risk_contract()
              for trade_type, profile in ENGINE_PROFILES.items()
          }
          '''
          if old not in text:
              raise SystemExit("risk profile block missing")
          risk.write_text(text.replace(old, new, 1))

          management = Path("app/trade_management_profiles.py")
          text = management.read_text()
          old = '''from math import isfinite
          from typing import Any


          LEGACY_MAX_HOLD_SECONDS = 4 * 60 * 60

          TRADE_MANAGEMENT_PROFILES: dict[str, dict[str, Any]] = {
              "scalping": {
                  "profile_name": "scalping_v2",
                  "tp1_r": 1.5,
                  "tp2_r": 2.0,
                  "runner_r": 2.5,
                  "tp1_fraction": 0.50,
                  "tp2_fraction": 0.25,
                  "runner_fraction": 0.25,
                  "break_even_trigger_r": 1.0,
                  "post_tp2_stop_r": 1.5,
                  "trailing_enabled": False,
                  "max_hold_seconds": 30 * 60,
              },
              "intraday": {
                  "profile_name": "intraday_v1",
                  "tp1_r": 2.0,
                  "tp2_r": 2.5,
                  "runner_r": 3.0,
                  "tp1_fraction": 0.50,
                  "tp2_fraction": 0.25,
                  "runner_fraction": 0.25,
                  "break_even_trigger_r": 2.0,
                  "post_tp2_stop_r": None,
                  "trailing_enabled": True,
                  "max_hold_seconds": 6 * 60 * 60,
              },
          }
          '''
          new = '''from math import isfinite
          from typing import Any

          from app.engines import ENGINE_PROFILES, SCALPING_PROFILE


          LEGACY_MAX_HOLD_SECONDS = 4 * 60 * 60

          # Backward-compatible public view derived from the canonical engine profiles.
          TRADE_MANAGEMENT_PROFILES: dict[str, dict[str, Any]] = {
              trade_type: profile.management_contract()
              for trade_type, profile in ENGINE_PROFILES.items()
          }
          PROFILE_NAMES = frozenset(profile.profile_name for profile in ENGINE_PROFILES.values())
          '''
          if old not in text:
              raise SystemExit("management profile block missing")
          text = text.replace(old, new, 1)
          old = '''def is_profiled_management(management: dict[str, Any]) -> bool:
              return str(management.get("profile_name") or "") in {
                  "scalping_v2",
                  "intraday_v1",
              }


          def is_scalping_management(management: dict[str, Any]) -> bool:
              return str(management.get("profile_name") or "") == "scalping_v2"
          '''
          new = '''def is_profiled_management(management: dict[str, Any]) -> bool:
              return str(management.get("profile_name") or "") in PROFILE_NAMES


          def is_scalping_management(management: dict[str, Any]) -> bool:
              return str(management.get("profile_name") or "") == SCALPING_PROFILE.profile_name
          '''
          if old not in text:
              raise SystemExit("management helper block missing")
          management.write_text(text.replace(old, new, 1))

          guard = Path("app/intraday_protection_guard.py")
          text = guard.read_text()
          old = "from typing import Any\n\nfrom app.execution_core import get_active_trades\n"
          new = "from typing import Any\n\nfrom app.engines import INTRADAY_PROFILE as INTRADAY_ENGINE_PROFILE\nfrom app.execution_core import get_active_trades\n"
          if old not in text:
              raise SystemExit("intraday guard import anchor missing")
          text = text.replace(old, new, 1)
          old = 'INTRADAY_PROFILE = "intraday_v1"\n'
          new = 'INTRADAY_PROFILE = INTRADAY_ENGINE_PROFILE.profile_name\n'
          if old not in text:
              raise SystemExit("intraday guard profile anchor missing")
          guard.write_text(text.replace(old, new, 1))
          PY

      - name: Verify backend
        run: |
          python -m compileall -q app tests
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Commit verified changes and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/export-source-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/risk.py app/trade_management_profiles.py app/intraday_protection_guard.py .github/workflows/export-source-temp.yml
          git diff --cached --quiet || git commit -m "refactor: centralize risk and management profiles"
          git push origin HEAD:${{ github.head_ref }}
