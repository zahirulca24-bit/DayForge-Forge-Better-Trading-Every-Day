name: P0-3 Residual Journal Truth Controller

on:
  pull_request:
    branches:
      - main
    types:
      - reopened

permissions:
  contents: write

jobs:
  rebuild-verify-commit:
    if: github.head_ref == 'fix/p0-3-residual-journal-truth'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/p0-3-residual-journal-truth
          fetch-depth: 0
      - name: Preserve verified product files
        run: |
          mkdir -p /tmp/p0-3-residual/app /tmp/p0-3-residual/frontend/src/components /tmp/p0-3-residual/tests
          cp app/exchange_journal_backfill.py /tmp/p0-3-residual/app/
          cp frontend/src/components/TradeHistory.tsx /tmp/p0-3-residual/frontend/src/components/
          cp tests/test_exchange_journal_backfill.py /tmp/p0-3-residual/tests/
      - name: Rebuild from latest main
        run: |
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/p0-3-residual/app/exchange_journal_backfill.py app/
          cp /tmp/p0-3-residual/frontend/src/components/TradeHistory.tsx frontend/src/components/
          cp /tmp/p0-3-residual/tests/test_exchange_journal_backfill.py tests/
          rm -f .github/workflows/p0-3-residual-controller.yml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python -m compileall -q app tests
      - run: python -m unittest tests.test_exchange_journal_backfill -v
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - working-directory: frontend
        run: npm ci && npm run lint && npm run build
      - name: Commit clean rebuilt branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app frontend tests .github
          git commit -m "Rebuild residual journal audit truth from latest main"
          git push --force-with-lease origin HEAD:fix/p0-3-residual-journal-truth
