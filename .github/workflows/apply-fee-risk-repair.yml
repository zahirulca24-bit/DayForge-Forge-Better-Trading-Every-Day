          Path("tests/test_fee_inclusive_risk.py").write_text(
              '''import unittest
from datetime import UTC, datetime

from app.execution_service import _validate_actual_fill
from app.position_sizing import calculate_position_size
from app.trading_costs import calculate_cost_adjusted_geometry


class FakeClient:
    def normalize_quantity(self, value: float, qty_step: str) -> str:
        step = float(qty_step)
        normalized = int(value / step) * step
        return f"{normalized:.8f}".rstrip("0").rstrip(".")


class FeeInclusiveRiskTests(unittest.TestCase):
    def test_geometry_adds_entry_and_stop_costs_to_risk(self) -> None:
        result = calculate_cost_adjusted_geometry(
            direction="long",
            entry=100.0,
            stop_loss=98.0,
            take_profit=104.0,
            quantity=10.0,
            fee_bps=5.5,
            slippage_bps=0.0,
        )

        self.assertIsNotNone(result)
        assert result is not None
        self.assertAlmostEqual(result["gross_risk"], 20.0, places=8)
        self.assertGreater(result["net_risk"], result["gross_risk"])
        self.assertLess(result["net_risk_reward"], result["gross_risk_reward"])

    def test_position_size_keeps_fees_inside_fixed_risk_budget(self) -> None:
        result = calculate_position_size(
            signal={
                "symbol": "DOGEUSDT",
                "direction": "long",
                "entry": 0.0732,
                "stop_loss": 0.0728,
                "take_profit": 0.0744,
                "detected_at": datetime.now(UTC).isoformat(),
            },
            wallet={"totalEquity": "1000", "totalAvailableBalance": "1000"},
            symbol_info={
                "qtyStep": "1",
                "tickSize": "0.0001",
                "minOrderQty": "1",
                "minNotionalValue": "5",
            },
            active_trades=[],
            positions=[],
            settings={
                "risk_amount": 20.0,
                "leverage_cap": 20.0,
                "exposure_cap": 0.50,
                "fee_bps": 5.5,
                "slippage_bps": 0.0,
                "min_risk_reward": 1.5,
            },
            client=FakeClient(),
        )

        self.assertTrue(result["allowed"])
        self.assertLess(result["gross_price_risk_amount"], 20.0)
        self.assertGreater(result["estimated_stop_costs"], 0.0)
        self.assertLessEqual(result["fee_inclusive_risk_amount"], 20.0 * 1.001)
        self.assertGreaterEqual(result["net_risk_reward"], 1.5)

    def test_position_size_rejects_gross_rr_that_fails_after_costs(self) -> None:
        result = calculate_position_size(
            signal={
                "symbol": "DOGEUSDT",
                "direction": "long",
                "entry": 0.0732,
                "stop_loss": 0.0728,
                "take_profit": 0.0738,
                "detected_at": datetime.now(UTC).isoformat(),
            },
            wallet={"totalEquity": "1000", "totalAvailableBalance": "1000"},
            symbol_info={
                "qtyStep": "1",
                "tickSize": "0.0001",
                "minOrderQty": "1",
                "minNotionalValue": "5",
            },
            active_trades=[],
            positions=[],
            settings={
                "risk_amount": 20.0,
                "leverage_cap": 20.0,
                "exposure_cap": 0.50,
                "fee_bps": 5.5,
                "slippage_bps": 0.0,
                "min_risk_reward": 1.5,
            },
            client=FakeClient(),
        )

        self.assertFalse(result["allowed"])
        self.assertIn("Net risk reward", result["reason"])

    def test_actual_fill_counts_costs_inside_fixed_risk_budget(self) -> None:
        result = _validate_actual_fill(
            direction="long",
            entry=100.0,
            stop_loss=98.0,
            take_profit=104.0,
            quantity=10.0,
            validation={"risk_amount": 20.0, "min_risk_reward": 1.5},
            fee_bps=5.5,
            slippage_bps=0.0,
        )

        self.assertFalse(result["allowed"])
        self.assertAlmostEqual(result["gross_price_risk"], 20.0, places=8)
        self.assertGreater(result["actual_risk"], 20.0)
        self.assertIn("fee-inclusive risk", result["reason"])

    def test_actual_fill_rejects_when_fees_break_net_rr(self) -> None:
        result = _validate_actual_fill(
            direction="long",
            entry=0.0732,
            stop_loss=0.0728,
            take_profit=0.0738,
            quantity=1000.0,
