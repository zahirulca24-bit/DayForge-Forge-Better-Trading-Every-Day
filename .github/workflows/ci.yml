name: Apply P0-1F UI Patch

on:
  push:
    branches:
      - fix/p0-1f-cross-page-performance-truth

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-1f-cross-page-performance-truth
          fetch-depth: 0

      - name: Apply targeted UI changes
        run: python .github/p0-1f/apply_patch.py

      - name: Restore normal CI and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .github/p0-1f

      - name: Commit feature-preserving patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml .github/p0-1f frontend/src/components/TradeHistory.tsx frontend/src/components/PerformanceStrategy.tsx frontend/src/components/ActiveTrades.tsx
          git commit -m "P0-1F: integrate backend truth without deleting UI features"
          git push origin HEAD:fix/p0-1f-cross-page-performance-truth
